<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spores Intelligence Hub | Elite Web3 BD Tool</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Framer Motion for Animations -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #020617;
            color: white;
            overflow-x: hidden;
        }
        .cyber-grid {
            background-image: linear-gradient(to right, #1e293b 1px, transparent 1px), linear-gradient(to bottom, #1e293b 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(circle, black, transparent 80%);
        }
        .glow-border:focus {
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.5);
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #22d3ee; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = FramerMotion;

        const SporesIntelligenceApp = () => {
            const [url, setUrl] = useState('');
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [result, setResult] = useState(null);

            // Mock logic để giả lập việc cào dữ liệu và AI phân tích
            const runAnalysis = () => {
                if (!url) return alert("Please paste a Twitter URL");
                setIsAnalyzing(true);
                
                // Giả lập thời gian AI "suy nghĩ"
                setTimeout(() => {
                    const mockProjectName = url.split('/').pop() || "Target Project";
                    const generatedScores = [
                        { id: 'A', label: 'Community Retention', score: Math.floor(Math.random() * 5) + 1, service: "User growth-hacking & community management" },
                        { id: 'B', label: 'Social Proof', score: Math.floor(Math.random() * 4) + 2, service: "KOL activation & shilling" },
                        { id: 'C', label: 'Narrative Resonance', score: Math.floor(Math.random() * 6) + 3, service: "Viral & brand marketing campaign" },
                        { id: 'D', label: 'Earned Media', score: Math.floor(Math.random() * 4) + 1, service: "PR booking & distribution across top media" },
                        { id: 'E', label: 'GTM Strategy', score: Math.floor(Math.random() * 5) + 2, service: "Marketing advisory & GTM strategy" }
                    ];

                    const lowScores = generatedScores.filter(s => s.score < 5);
                    const pitchedServices = lowScores.map(s => s.service).slice(0, 2).join(" and ");

                    setResult({
                        name: mockProjectName.toUpperCase(),
                        website: `www.${mockProjectName.toLowerCase()}.io`,
                        stage: "Pre-IDO / Pre-TGE",
                        chain: "Ethereum / Arbitrum",
                        scores: generatedScores,
                        blurb: `Hi ${mockProjectName} Team, I've been deep-diving into your recent growth metrics. While your vision is clear, our forensic analysis shows a gap in ${lowScores[0]?.label} (${lowScores[0]?.score}/10). At Spores Network, we specialize in ${pitchedServices} to ensure your upcoming TGE doesn't just launch, but dominates the market share. Let's weaponize your community data before the IDO.`
                    });
                    setIsAnalyzing(false);
                }, 3000);
            };

            return (
                <div className="relative min-h-screen flex flex-col items-center p-4 md:p-12">
                    {/* Background Tech Effects */}
                    <div className="fixed inset-0 cyber-grid opacity-30 pointer-events-none"></div>
                    <div className="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-cyan-500/10 blur-[120px] rounded-full"></div>
                    <div className="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-600/10 blur-[120px] rounded-full"></div>

                    {/* Header */}
                    <header className="relative z-10 flex flex-col items-center mb-12">
                        <div className="w-16 h-16 bg-gradient-to-tr from-cyan-400 to-blue-600 rounded-2xl rotate-45 flex items-center justify-center mb-6 shadow-[0_0_30px_rgba(6,182,212,0.5)]">
                            <i data-lucide="shield-check" className="text-black -rotate-45 w-8 h-8"></i>
                        </div>
                        <h1 className="text-3xl md:text-5xl font-extrabold tracking-tighter text-center">
                            SPORES <span className="text-cyan-400">INTEL</span> AGENT
                        </h1>
                        <p className="text-gray-400 mt-2 tracking-[0.3em] text-[10px] uppercase font-bold">Elite Web3 BD Sales Intelligence</p>
                    </header>

                    {/* Search Section */}
                    <div className="relative z-10 w-full max-w-3xl mb-12">
                        <div className="relative flex items-center">
                            <input 
                                type="text" 
                                value={url}
                                onChange={(e) => setUrl(e.target.value)}
                                placeholder="PASTE PROJECT X (TWITTER) URL..."
                                className="w-full bg-white/5 border border-white/10 rounded-2xl py-5 px-8 pl-14 focus:outline-none focus:border-cyan-500/50 glow-border transition-all text-lg font-light tracking-wide backdrop-blur-xl"
                            />
                            <div className="absolute left-5 text-gray-500">
                                <i data-lucide="search" className="w-6 h-6"></i>
                            </div>
                            <button 
                                onClick={runAnalysis}
                                disabled={isAnalyzing}
                                className="absolute right-3 bg-cyan-500 hover:bg-cyan-400 text-black font-black px-6 py-3 rounded-xl transition-all active:scale-95 disabled:opacity-50"
                            >
                                {isAnalyzing ? 'ANALYZING...' : 'EXTRACT'}
                            </button>
                        </div>
                    </div>

                    {/* Result Section */}
                    <AnimatePresence>
                        {isAnalyzing && (
                            <motion.div 
                                initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
                                className="flex flex-col items-center space-y-4 py-20"
                            >
                                <div className="w-12 h-12 border-4 border-cyan-500/20 border-t-cyan-500 rounded-full animate-spin"></div>
                                <p className="text-cyan-400 font-mono animate-pulse uppercase text-xs tracking-widest">Scanning Social Graph & On-chain Metrics...</p>
                            </motion.div>
                        )}

                        {result && !isAnalyzing && (
                            <motion.div 
                                initial={{ opacity: 0, y: 30 }} animate={{ opacity: 1, y: 0 }}
                                className="relative z-10 w-full max-w-5xl grid grid-cols-1 lg:grid-cols-12 gap-6"
                            >
                                {/* Left: Info Card */}
                                <div className="lg:col-span-4 space-y-6">
                                    <div className="bg-white/5 border border-white/10 p-6 rounded-3xl backdrop-blur-md">
                                        <h2 className="text-cyan-400 text-[10px] font-black uppercase tracking-widest mb-4">Project Identity</h2>
                                        <div className="space-y-4">
                                            <div><p className="text-gray-500 text-[10px] uppercase">Name</p><p className="text-xl font-bold">{result.name}</p></div>
                                            <div><p className="text-gray-500 text-[10px] uppercase">Stage</p><p className="text-orange-400 font-bold italic">{result.stage}</p></div>
                                            <div><p className="text-gray-500 text-[10px] uppercase">Chain</p><p className="">{result.chain}</p></div>
                                            <div className="pt-4 border-t border-white/5">
                                                <p className="text-gray-500 text-[10px] uppercase mb-2">Social Health</p>
                                                <div className="flex gap-2">
                                                    <span className="bg-green-500/20 text-green-400 text-[10px] px-2 py-1 rounded border border-green-500/30 font-bold">ACTIVE</span>
                                                    <span className="bg-red-500/20 text-red-400 text-[10px] px-2 py-1 rounded border border-red-500/30 font-bold">LOW-RETENTION</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Right: Scoring & Pitch */}
                                <div className="lg:col-span-8 space-y-6">
                                    <div className="bg-white/5 border border-white/10 p-8 rounded-3xl backdrop-blur-md">
                                        <h2 className="text-cyan-400 text-[10px] font-black uppercase tracking-widest mb-8">Weighted Dimension Evaluation</h2>
                                        <div className="space-y-6">
                                            {result.scores.map((s) => (
                                                <div key={s.id} className="relative">
                                                    <div className="flex justify-between text-xs mb-2">
                                                        <span className="text-gray-300 font-medium">Dimension {s.id}: {s.label}</span>
                                                        <span className={`font-black ${s.score < 5 ? 'text-red-500' : 'text-cyan-400'}`}>{s.score}/10</span>
                                                    </div>
                                                    <div className="w-full bg-white/5 h-1.5 rounded-full overflow-hidden">
                                                        <motion.div 
                                                            initial={{ width: 0 }} animate={{ width: `${s.score * 10}%` }}
                                                            className={`h-full ${s.score < 5 ? 'bg-red-600' : 'bg-cyan-500'}`}
                                                        ></motion.div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Sales Pitch Weapon */}
                                    <div className="bg-gradient-to-br from-cyan-500/20 to-blue-600/20 border border-cyan-500/40 p-8 rounded-3xl relative overflow-hidden group">
                                        <div className="absolute top-0 right-0 p-6 opacity-5 group-hover:opacity-10 transition-opacity">
                                            <i data-lucide="zap" className="w-32 h-32 text-white"></i>
                                        </div>
                                        <div className="relative z-10">
                                            <h3 className="flex items-center gap-2 text-cyan-400 font-black text-sm uppercase tracking-widest mb-4">
                                                <i data-lucide="target" className="w-4 h-4 text-cyan-400"></i>
                                                Personalized Sales Blurb
                                            </h3>
                                            <div className="bg-black/40 p-6 rounded-2xl border border-white/10 mb-6 group-hover:border-cyan-500/30 transition-all">
                                                <p className="text-gray-200 font-mono text-sm leading-relaxed">
                                                    "{result.blurb}"
                                                </p>
                                            </div>
                                            <div className="flex flex-wrap gap-2 mb-6">
                                                {result.scores.filter(s => s.score < 5).map((s, idx) => (
                                                    <span key={idx} className="bg-black/50 text-cyan-300 text-[9px] px-3 py-1 rounded-full border border-cyan-500/20 uppercase font-bold tracking-tighter">
                                                        Fixing: {s.service}
                                                    </span>
                                                ))}
                                            </div>
                                            <button 
                                                onClick={() => {
                                                    navigator.clipboard.writeText(result.blurb);
                                                    alert("Pitch copied to clipboard!");
                                                }}
                                                className="w-full bg-white text-black font-black py-4 rounded-2xl hover:bg-cyan-400 transition-all flex items-center justify-center gap-2"
                                            >
                                                <i data-lucide="copy" className="w-4 h-4"></i>
                                                COPY TO WEAPONIZE
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    {/* Footer */}
                    <footer className="mt-20 py-8 text-center text-gray-600 text-[10px] tracking-[0.2em] uppercase font-medium">
                        Property of Spores Network • Business Intelligence Unit © 2024
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SporesIntelligenceApp />);
        
        // Khởi tạo Lucide Icons sau khi React render
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
